version: '3.8'

services:
  evvm-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: evvm/testnet-contracts:latest
    container_name: evvm-cli
    
    # Mount your .env file (create it in the same directory as docker-compose.yml)
    volumes:
      # Mount .env file for configuration (place it in this directory)
      - ./.env:/workspace/.env:ro
      
      # Optional: Mount output directory to persist deployment results
      - ./output:/workspace/output
      
      # Optional: Mount Foundry keystore for wallet access
      # Uncomment if you want to use cast wallet import from host
      # - ~/.foundry/keystores:/root/.foundry/keystores:ro
    
    # Interactive mode
    stdin_open: true
    tty: true
    
    # Network mode
    network_mode: bridge
    
    # Environment variables (optional overrides)
    environment:
      - TERM=xterm-256color
    
    # Override default command to get an interactive shell
    # Uncomment to start with bash instead of the CLI help
    # command: /bin/bash

# Optional: Add a local Ethereum node for testing
  # anvil:
